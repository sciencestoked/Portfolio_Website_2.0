<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shubham Singhal | Robotics Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-main: #2d3436;
            --text-secondary: #636e72;
            --accent: #81ecec;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            font-weight: 300;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .role {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-box {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
        }

        p {
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .links {
            margin-top: 2rem;
        }

        .links a {
            text-decoration: none;
            color: var(--text-main);
            margin: 0 15px;
            font-size: 1.5rem;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #00cec9;
        }

        .resume-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: var(--text-main);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 500;
            transition: transform 0.2s ease;
        }

        .resume-btn:hover {
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Shubham Singhal</h1>
        <div class="role">Robotics Engineer & ML Enthusiast</div>

        <div class="status-box">
            <p>I am currently refining my digital portfolio to better showcase recent projects and technical pipelines.</p>
            <p><strong>The site will be back online shortly.</strong></p>
            
            <a href="assets/Shubham Singhal_Resume.pdf" target="_blank" class="resume-btn">
                <i class="fa-solid fa-file-pdf"></i> View My Resume
            </a>
        </div>

        <div class="links">
            <a href="https://linkedin.com/in/sciencestoked" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
            <a href="https://github.com/sciencestoked" target="_blank" title="GitHub"><i class="fa-brands fa-github"></i></a>
            <a href="mailto:ssinghalatwork@gmail.com" title="Email"><i class="fa-solid fa-envelope"></i></a>
        </div>
    </div>

</body>
</html>
